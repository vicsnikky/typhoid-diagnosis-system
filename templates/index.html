
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Typhoid Diagnosis Prototype</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 760px; margin: 24px auto; padding: 0 12px; }
    .card { border: 1px solid #ddd; padding: 16px; border-radius: 6px; margin-bottom: 12px; }
    label { display:block; margin-top:8px; }
    .row { display:flex; gap:8px; }
    .btn { background:#1976d2; color:white; padding:8px 12px; border:none; border-radius:4px; cursor:pointer;}
    .result { padding:12px; border-radius:6px; margin-top:12px; }
    .severity-mild { background:#e8f5e9; border: 1px solid #c8e6c9; }
    .severity-moderate { background:#fff8e1; border: 1px solid #ffecb3; }
    .severity-severe { background:#ffebee; border: 1px solid #ffcdd2; }
    pre { background:#f6f8fa; padding:8px; border-radius:4px; overflow:auto;}
  </style>
</head>
<body>
  <h1>Typhoid Diagnosis System</h1>

  <div class="card">
    <form id="intake-form">
      <label>Age: <input type="number" id="age" name="age" min="0" /></label>
      <label>Gender:
        <select id="gender" name="gender">
          <option value="">--</option>
          <option value="female">Female</option>
          <option value="male">Male</option>
          <option value="other">Other</option>
        </select>
      </label>

      <h3>Symptoms (select fever severity)</h3>
      <label>Fever:
        <select id="fever" name="fever">
          <option value="none">None</option>
          <option value="low">Low</option>
          <option value="moderate">Moderate</option>
          <option value="high">High</option>
        </select>
      </label>

      <label><input type="checkbox" id="abdominal_pain" /> Abdominal pain</label>
      <label><input type="checkbox" id="coated_tongue" /> Coated tongue</label>
      <label><input type="checkbox" id="severe_dehydration" /> Signs of severe dehydration (sunken eyes, lethargy)</label>

      <h3>Optional tests</h3>
      <label>Blood culture:
        <select id="blood_culture">
          <option value="">Unknown</option>
          <option value="positive">Positive</option>
          <option value="negative">Negative</option>
        </select>
      </label>

      <h3>Consent</h3>
      <label><input type="checkbox" id="consent_store" /> I consent to temporary, educational data storage for demonstration purposes</label>

      <div style="margin-top:12px;">
        <button type="button" id="submitBtn" class="btn">Submit</button>
      </div>
    </form>
  </div>

  <div id="responseArea"></div>

  <script src="/static/main.js"></script>
</body>
</html>
